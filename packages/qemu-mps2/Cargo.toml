[package]
edition = "2021"
name = "kei-qemu-mps2"
version = "0.1.0"
publish = false
# Explicitly bind to the kei-wire sub-workspace rooted at `packages/kei`.
# Without this, cargo's workspace discovery walks up from this crate to
# `kei/Cargo.toml` and tries to claim qemu-mps2 as a member of the in-kernel
# workspace (which is wrong — the in-kernel workspace excludes packages/kei).
workspace = "../kei"

[dependencies]
# kei wire protocol library (sibling package in the kei sub-workspace).
# qemu-mps2 and the kei wire library are co-located in a [workspace] rooted at
# `packages/kei/Cargo.toml`. Earlier this dep read `path = "../.."` which
# incorrectly resolved to the kei root workspace (which excludes `packages/kei`).
kei = { path = "../kei", default-features = false, features = [
    "wire",
    "manifest",
    "hal",
] }

# Heap allocator for `alloc` (kei's wire protocol uses Vec<u8> for frames).
linked_list_allocator = "0.10"

# Cortex-M runtime — only for the firmware binary (no_std target).
[target.'cfg(target_os = "none")'.dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"
critical-section = "1"

[profile.release]
debug = 2
opt-level = 3
lto = false
panic = "abort"
