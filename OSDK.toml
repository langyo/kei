# The OSDK manifest at the Asterinas root virtual workspace
# provides default OSDK settings for all packages.

# The common options for build, run and test
[boot]
method = "grub-rescue-iso"

[grub]
boot_protocol = "multiboot2"

[qemu]
args = "$(./scripts/tools/qemu_args.sh normal)"

# Special options for running
[run.boot]
kcmd_args = [
    "SHELL=/bin/sh",
    "LOGNAME=root",
    "HOME=/",
    "USER=root",
    "PATH=/bin:/benchmark",
    "init=/init",
]
init_args = ["sh", "-l"]
initramfs = "tests/initramfs/build/initramfs.cpio.gz"

# Special options for testing
[test.qemu]
args = "$(./scripts/tools/qemu_args.sh test)"

# Other Schemes

# x86_64 boots as a Linux bzImage on the QEMU microvm machine (qemu-direct).
# The args are inlined (like the aarch64 scheme) instead of going through
# scripts/tools/qemu_args.sh because that script (a) is not executable under
# WSL when the worktree is checked out with core.autocrlf=true (CRLF shebang
# breaks the #!/bin/bash interpreter), and (b) references upstream Nix-built
# disk images (./test/initramfs/build/ext2.img et al.) that kei does not have,
# which makes QEMU refuse to start.
[scheme."microvm"]
supported_archs = ["x86_64"]
boot.method = "qemu-direct"
build.strip_elf = true
grub.boot_protocol = "linux"

# Serial console and QEMU monitor are multiplexed onto stdio (use Ctrl-A h for
# the monitor). The full session is also logged to target/qemu_x86_64.log.
qemu.args = """\
    -cpu Icelake-Server,+x2apic \
    -machine microvm,rtc=on \
    -nodefaults \
    -no-user-config \
    -m ${MEM:-2G} \
    -smp ${SMP:-1} \
    --no-reboot \
    -display none \
    -serial chardev:mux \
    -monitor chardev:mux \
    -chardev stdio,id=mux,mux=on,signal=off,logfile=target/qemu_x86_64.log \
    -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
    -device virtio-keyboard-device \
    -device virtio-serial-device \
    -device virtconsole,chardev=mux \
    -netdev user,id=net0,hostfwd=tcp::2223-:22 \
    -device virtio-net-device,netdev=net0 \
"""

[scheme."iommu"]
supported_archs = ["x86_64"]
qemu.args = "$(./scripts/tools/qemu_args.sh iommu)"

[scheme."tdx"]
supported_archs = ["x86_64"]
build.features = ["cvm_guest"]
boot.method = "grub-qcow2"
grub.boot_protocol = "linux"
qemu.args = "$(./scripts/tools/qemu_args.sh tdx)"

[scheme."riscv"]
supported_archs = ["riscv64"]
boot.method = "qemu-direct"
build.strip_elf = false
qemu.args = "$(./scripts/tools/qemu_args.sh riscv)"

[scheme."sifive_u"]
supported_archs = ["riscv64"]
build.features = ["riscv_sv39_mode"]
boot.method = "qemu-direct"
build.strip_elf = false
qemu.with_monitor = true

qemu.args = """\
    -machine sifive_u \
    -m 8G \
    -smp 5 \
    -no-reboot \
    -nographic \
    -display none \
    -serial chardev:mux \
    -monitor chardev:mux \
    -chardev stdio,id=mux,mux=on,signal=off,logfile=target/qemu.log
"""

[scheme."loongarch"]
boot.method = "qemu-direct"
build.strip_elf = false

qemu.args = """\
    -machine virt \
    -m 8G \
    -smp 1 \
    --no-reboot \
    -nographic \
    -display none \
    -serial chardev:mux \
    -monitor chardev:mux \
    -chardev stdio,id=mux,mux=on,signal=off,logfile=target/qemu.log \
    -device virtio-keyboard-pci \
    -device virtio-serial \
    -device virtconsole,chardev=mux \
    -rtc base=utc
"""

[scheme."aarch64"]
supported_archs = ["aarch64"]
boot.method = "qemu-direct"
build.strip_elf = false

# QEMU args for aarch64. Drives both a serial console (for kernel logs) and
# a graphical window (for the virtio-gpu 2D scanout). Override the display
# backend with $QEMU_DISPLAY (e.g. `-display none` for headless CI,
# `-display sdl` for a local window, `-display vnc=0.0.0.0:0` for remote).
# Default keeps a window when $QEMU_DISPLAY is unset; set QEMU_DISPLAY=-display none
# in CI to stay headless.
qemu.args = """\
    -cpu cortex-a72 \
    -machine virt,gic-version=3,virtualization=on \
    -m ${MEM:-2G} \
    -smp ${SMP:-4} \
    --no-reboot \
    -serial chardev:mux \
    -monitor chardev:mux \
    -chardev stdio,id=mux,mux=on,signal=off,logfile=target/qemu.log \
    -device virtio-gpu-device \
    -device virtio-keyboard-device \
    -device virtio-serial-device \
    -device virtconsole,chardev=mux \
    -netdev user,id=net0,hostfwd=tcp::2222-:22,hostfwd=tcp::8423-:8423,hostfwd=tcp::3000-:3000 \
    -device virtio-net-device,netdev=net0 \
    ${QEMU_DISPLAY:--display sdl} \
"""

# aarch64 uses its own initramfs (with dropbear SSH server) and init args.
[scheme."aarch64".run.boot]
initramfs = "tests/initramfs/build/initramfs_aarch64.cpio.gz"
kcmd_args = [
    "SHELL=/bin/sh",
    "LOGNAME=root",
    "HOME=/root",
    "USER=root",
    "PATH=/bin:/sbin",
]
init_args = ["/init"]
